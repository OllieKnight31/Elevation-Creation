<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0f0d;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .container {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 60px 0;
  }
  .container::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(circle, rgba(62,207,160,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .brand {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: #3ECFA0;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 40px;
    position: relative;
    z-index: 2;
  }
  .date {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 110px;
    color: #FFFFFF;
    line-height: 1;
    margin-bottom: 20px;
    text-shadow: 0 0 60px rgba(62,207,160,0.1);
    position: relative;
    z-index: 2;
  }
  .free-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 34px;
    color: #3ECFA0;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
  }
  .description {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 30px;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
    max-width: 800px;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
  }
  .description strong {
    color: #FFFFFF;
    font-weight: 600;
  }
  .photo-wrapper {
    width: 420px;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    z-index: 2;
    border: 3px solid rgba(62,207,160,0.3);
    box-shadow: 0 0 40px rgba(62,207,160,0.1);
    flex-shrink: 0;
  }
  .photo-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 90px;
    background: rgba(10,15,13,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    z-index: 10;
  }
  .bottom-strip span {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #3ECFA0;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .bottom-strip .sep {
    color: rgba(62,207,160,0.4);
    font-size: 22px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="brand">Property Labs</div>
  <div class="date">APRIL 13TH</div>
  <div class="free-label">FREE LIVE TRAINING</div>
  <div class="description">
    <strong>The 3C System:</strong> How to Build<br>Cash-Flowing Airbnbs
  </div>
  <div class="photo-wrapper">
    <img src="/images/terry-casual.jpg" alt="Terry">
  </div>
  <div class="bottom-strip">
    <span>7PM BST</span>
    <span class="sep">|</span>
    <span>90 MINUTES</span>
    <span class="sep">|</span>
    <span>100% FREE</span>
  </div>
</div>
</body>
</html>
