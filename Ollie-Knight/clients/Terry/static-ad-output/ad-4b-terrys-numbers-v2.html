<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0f0d;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .container {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
  }
  .photo-side {
    width: 45%;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }
  .photo-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .photo-side::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 50%, #0a0f0d 100%),
                linear-gradient(180deg, rgba(10,15,13,0.3) 0%, transparent 20%, transparent 80%, rgba(10,15,13,0.8) 100%);
  }
  .stats-side {
    width: 55%;
    height: 1350px;
    padding: 0 60px;
    padding-bottom: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .stat-block {
    margin-bottom: 50px;
  }
  .stat-block .number {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 96px;
    color: #3ECFA0;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-block .label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: #FFFFFF;
    letter-spacing: 1px;
  }
  .stat-block .sublabel {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }
  .stat-block::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: rgba(62,207,160,0.3);
    margin-top: 20px;
  }
  .stat-block:last-child::after {
    display: none;
  }
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(135deg, #3ECFA0 0%, #2BB88A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .cta-bar span {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 30px;
    color: #0a0f0d;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="photo-side">
    <img src="/images/terry-hero.jpg" alt="Terry">
  </div>
  <div class="stats-side">
    <div class="stat-block">
      <div class="number">14</div>
      <div class="label">Airbnb Units</div>
    </div>
    <div class="stat-block">
      <div class="number">&pound;16K</div>
      <div class="label">Monthly Profit</div>
    </div>
    <div class="stat-block">
      <div class="number">25+</div>
      <div class="label">Students With Results</div>
    </div>
    <div class="stat-block">
      <div class="number">90 Days</div>
      <div class="label">To First Profitable Unit</div>
    </div>
  </div>
  <div class="cta-bar">
    <span>Free Training — April 13th</span>
  </div>
</div>
</body>
</html>
