<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0f0d;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .container {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(62,207,160,0.08) 0%, transparent 65%);
    pointer-events: none;
  }
  .countdown {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 180px;
    color: #FFFFFF;
    line-height: 1;
    margin-bottom: 0;
    position: relative;
    z-index: 2;
    text-shadow: 0 0 80px rgba(62,207,160,0.15);
  }
  .countdown-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 80px;
    color: #FFFFFF;
    line-height: 1;
    margin-bottom: 30px;
    position: relative;
    z-index: 2;
    text-shadow: 0 0 80px rgba(62,207,160,0.1);
  }
  .countdown-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 30px;
    color: #3ECFA0;
    line-height: 1.4;
    max-width: 700px;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
  }
  .terry-circle {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid rgba(62,207,160,0.4);
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
    box-shadow: 0 0 40px rgba(62,207,160,0.1), 0 0 80px rgba(62,207,160,0.05);
    flex-shrink: 0;
  }
  .terry-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .free-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #3ECFA0;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }
  .event-details {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 40px;
    position: relative;
    z-index: 2;
  }
  .cta-button {
    background: linear-gradient(135deg, #3ECFA0 0%, #2BB88A 100%);
    padding: 22px 80px;
    border-radius: 14px;
    position: relative;
    z-index: 2;
    box-shadow: 0 4px 30px rgba(62,207,160,0.3), 0 2px 10px rgba(62,207,160,0.2);
  }
  .cta-button span {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 30px;
    color: #0a0f0d;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>
  <div class="countdown">11 DAYS</div>
  <div class="countdown-label">LEFT</div>
  <div class="countdown-sub">to learn the system behind 14 Airbnb units</div>
  <div class="terry-circle">
    <img src="/images/terry-hero.jpg" alt="Terry">
  </div>
  <div class="free-label">FREE LIVE TRAINING</div>
  <div class="event-details">Sunday, April 13th — 7PM BST</div>
  <div class="cta-button">
    <span>Register Now</span>
  </div>
</div>
</body>
</html>
