<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0f0d;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .container {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .glow {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -20%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(62,207,160,0.12) 0%, rgba(62,207,160,0.04) 30%, transparent 65%);
    pointer-events: none;
  }
  .big-number {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 480px;
    color: #FFFFFF;
    line-height: 0.85;
    position: relative;
    z-index: 2;
    text-shadow: 0 0 80px rgba(62,207,160,0.15), 0 0 160px rgba(62,207,160,0.05);
    margin-bottom: 20px;
  }
  .label-1 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 56px;
    color: #3ECFA0;
    letter-spacing: 6px;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
    margin-bottom: 30px;
  }
  .label-2 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 38px;
    color: #FFFFFF;
    position: relative;
    z-index: 2;
    margin-bottom: 16px;
  }
  .label-3 {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 30px;
    color: rgba(255,255,255,0.7);
    position: relative;
    z-index: 2;
  }
  .cta-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(135deg, #3ECFA0 0%, #2BB88A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .cta-bar span {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 30px;
    color: #0a0f0d;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>
  <div class="big-number">14</div>
  <div class="label-1">Airbnb Units</div>
  <div class="label-2">&pound;16k/month peak profit</div>
  <div class="label-3">Started as a university student.</div>
  <div class="cta-bar">
    <span>Learn the system — Free Training April 13th</span>
  </div>
</div>
</body>
</html>
