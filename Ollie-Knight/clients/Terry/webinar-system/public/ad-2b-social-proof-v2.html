<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0f0d;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .container {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .photos-row {
    width: 1080px;
    height: 700px;
    display: flex;
    position: relative;
    flex-shrink: 0;
  }
  .student-photo {
    width: 33.333%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }
  .student-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .student-photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(10,15,13,0.9) 100%);
  }
  .student-info {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 2;
  }
  .student-info .name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 30px;
    color: #FFFFFF;
    margin-bottom: 8px;
  }
  .student-info .result {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 19px;
    color: #3ECFA0;
    line-height: 1.3;
    padding: 0 12px;
  }
  .divider-line {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: rgba(62,207,160,0.2);
    z-index: 3;
  }
  .divider-1 { left: 33.333%; }
  .divider-2 { left: 66.666%; }
  .bottom-content {
    width: 1080px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 80px;
    text-align: center;
    position: relative;
  }
  .bottom-content::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(62,207,160,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .bottom-content h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 82px;
    color: #FFFFFF;
    line-height: 1.05;
    margin-bottom: 30px;
  }
  .bottom-content h1 span {
    color: #3ECFA0;
  }
  .bottom-content .sub {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 32px;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
    margin-bottom: 60px;
  }
  .bottom-content .sub strong {
    color: #FFFFFF;
    font-weight: 600;
  }
  .bottom-cta {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #3ECFA0;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <div class="photos-row">
    <div class="student-photo">
      <img src="/images/ihab.jpg" alt="Ehab">
      <div class="student-info">
        <div class="name">EHAB</div>
        <div class="result">&pound;25K raised<br>in 5 weeks</div>
      </div>
    </div>
    <div class="student-photo">
      <img src="/images/dylan.jpg" alt="Dylan">
      <div class="student-info">
        <div class="name">DYLAN</div>
        <div class="result">5 Airbnbs<br>&pound;12K best month</div>
      </div>
    </div>
    <div class="student-photo">
      <img src="/images/andrew.jpg" alt="Andrew">
      <div class="student-info">
        <div class="name">ANDREW</div>
        <div class="result">&pound;13K raised<br>in month 1</div>
      </div>
    </div>
    <div class="divider-line divider-1"></div>
    <div class="divider-line divider-2"></div>
  </div>
  <div class="bottom-content">
    <h1><span>25+</span> Students Getting Results</h1>
    <div class="sub">The <strong>3C System</strong> works. Here's your proof.</div>
    <div class="bottom-cta">FREE TRAINING — APRIL 13</div>
  </div>
</div>
</body>
</html>
